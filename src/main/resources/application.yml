server:
  forward-headers-strategy: native

spring:
  application:
    name: agent-credential-broker
  security:
    oauth2:
      client:
        registration:
          sso:
            provider: sso
        provider:
          sso: {}
      resourceserver:
        jwt:
          issuer-uri: ${sso.issuer-uri:}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/broker}
    username: ${DATABASE_USERNAME:broker}
    password: ${DATABASE_PASSWORD:broker}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

broker:
  delegation:
    signing-secret: ${BROKER_SIGNING_SECRET:change-me-in-production}
    previous-signing-secret: ${BROKER_PREVIOUS_SIGNING_SECRET:}
    default-ttl: 72h
    max-ttl: 720h
  cf-api:
    base-url: ${CF_API_URL:}
  mtls:
    enabled: ${BROKER_MTLS_ENABLED:true}
    port: ${BROKER_MTLS_PORT:8443}
    workload-identity-header: X-Forwarded-Client-Cert
